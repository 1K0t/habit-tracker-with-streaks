services:
  postgres:
    image: postgres:16-alpine
    container_name: habit-tracker-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: habit_tracker
    volumes:
      - habit_pg_data:/var/lib/postgresql/data

volumes:
  habit_pg_data:
